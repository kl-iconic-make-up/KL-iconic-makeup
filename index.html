    /* ESTRELLAS ORO ROSA EN TODA LA PANTALLA */
body::before {
    content: "";
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;

    background-image:
        radial-gradient(2px 2px at 10% 20%, rgba(247,198,199,0.9), transparent),
        radial-gradient(1.5px 1.5px at 30% 40%, rgba(247,198,199,0.8), transparent),
        radial-gradient(2px 2px at 50% 60%, rgba(247,198,199,0.9), transparent),
        radial-gradient(1.5px 1.5px at 70% 30%, rgba(247,198,199,0.8), transparent),
        radial-gradient(2px 2px at 90% 80%, rgba(247,198,199,0.9), transparent),
        radial-gradient(1.5px 1.5px at 20% 70%, rgba(247,198,199,0.8), transparent),
        radial-gradient(2px 2px at 80% 50%, rgba(247,198,199,0.9), transparent);

    background-repeat: repeat;
    background-size: 400px 400px;

    animation: moverEstrellas 80s linear infinite, brilloEstrellas 3s ease-in-out infinite alternate;

    z-index: 0;
    pointer-events: none;
}

/* MOVIMIENTO SUAVE */
@keyframes moverEstrellas {
    from {
        transform: translate(0, 0);
    }
    to {
        transform: translate(200px, 200px);
    }
}

/* DESTELLO */
@keyframes brilloEstrellas {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
}
/* LOGO */
.logo-container {
